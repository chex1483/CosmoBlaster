    .lang-btn { background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15); color:#aaa; font-size:1.4rem; padding:6px 10px; border-radius:12px; cursor:pointer; transition:0.2s; }
    .lang-btn.active { border-color:#FFD966; color:#FFD966; background:rgba(255,215,0,0.12); box-shadow:0 0 12px rgba(255,215,0,0.2); }
    .menu-btn { background:linear-gradient(180deg,#FFD966 0%,#FF8C00 100%); border:none; color:#1a1a2e; font-weight:bold; padding:15px 40px; border-radius:40px; font-size:1.3rem; margin:6px; cursor:pointer; box-shadow:0 8px 20px rgba(255,140,0,0.5); transition:0.2s; letter-spacing:1px; pointer-events:auto; width:200px; }

  function playSound(freq,type,dur,vol=0.08,g=null){
    if(!audioCtx)return;
    const t=audioCtx.currentTime,o=audioCtx.createOscillator(),gn=audioCtx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,t);if(g)o.frequency.linearRampToValueAtTime(g,t+dur);
    gn.gain.setValueAtTime(vol,t);gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(gn);gn.connect(audioCtx.destination);o.start(t);o.stop(t+dur);
  }

  // ======== ПЕРЕВОДЫ ========
  const translations={
    en:{menuSubtitle:'Arcade space shooter',playBtn:'🎮 PLAY',menuShopBtn:'🛍️ SHOP',menuBalance:'💰 Balance: ',shopTitle:'✨ XTR SHOP ✨',itemShield:'🛡️ Shield (1 game)',itemDouble:'⚡ Double Shot',itemLife:'❤️ Extra Life',itemDonate:'💎 500 XTR',donateBtn:'💳 BUY',closeBtn:'✕ CLOSE',gameOverTitle:'💥 BOOM!',gameOverWave:'Wave: ',gameOverKills:'Kills: ',restartBtn:'🚀 PLAY AGAIN',toMenuBtn:'🏠 MENU',loadingText:['Loading graphics...','Setting up physics...','Connecting XTR...','Ready!'],wavePhrases:['NICE SHOT! 🎯','PROFESSIONAL! 👑','GODLIKE! ⚡','IMPRESSIVE! 🌟','DEVASTATING! 💥','UNSTOPPABLE! 🔥','LEGENDARY! 🏆','MASSACRE! 💀','FLAWLESS! ✨','COSMIC POWER! 🌌'],waveLabel:'WAVE ',alertNoXTR:'Not enough XTR!',alertShield:'🛡️ Shield activated!',alertDouble:'⚡ Double shot activated!',alertLife:'❤️ +1 life!',alertDonate:'💎 500 XTR donated (demo)',bossLabel:'👹 '},

  let bullets=[],enemies=[],particles=[],spawnTimer=0,frameCount=0,targetX=200;
  let fakeRating=1337;
  const enemiesPerWaveBase=10,bossEveryWaves=10;

  function getEnemySpeed(){return 1.5+(currentLevel-1)*0.4+(currentWave-1)*0.08+Math.random()*1.2;}
  function updateFakeRating(){fakeRating=Math.max(1,fakeRating+Math.floor(Math.random()*21)-10);ratingValueSpan.textContent=fakeRating;}

   function resizeCanvas(){
    const c=document.getElementById('gameContainer'),r=c.getBoundingClientRect();
    W=r.width;H=r.height;canvas.width=W;canvas.height=H;player.y=H-80;targetX=W/2;
  }
  window.addEventListener('resize',resizeCanvas);resizeCanvas();

  function handleMove(e){
    e.preventDefault();
    if(gameState!=='playing'||!gameActive||playerDead||player.flyingAway)return;
    const r=canvas.getBoundingClientRect();
    let cx=e.touches?e.touches[0].clientX:e.clientX;
    targetX=(cx-r.left)*(W/r.width);targetX=Math.min(Math.max(targetX,24),W-24);
  }
  canvas.addEventListener('mousemove',handleMove);
  canvas.addEventListener('touchmove',handleMove,{passive:false});
  canvas.addEventListener('touchstart',handleMove,{passive:false});

  function shootBullet(){
    if(gameState!=='playing'||!gameActive||playerDead||player.flyingAway)return;
    bullets.push({x:player.x-2,y:player.y-26,width:8,height:22,speed:-10});
    if(player.doubleShot){bullets.push({x:player.x+14,y:player.y-18,width:8,height:22,speed:-10});bullets.push({x:player.x-18,y:player.y-18,width:8,height:22,speed:-10});}
    sfxShoot();
  }
  setInterval(()=>{if(gameState==='playing')shootBullet();},260);

  function startWave(){waveSpawning=true;enemiesSpawned=0;enemiesInWave=enemiesPerWaveBase+(currentWave-1)*3;bossActive=false;bossObj=null;spawnTimer=20;updateHUD();}
  function spawnEnemy(){
    if(!waveSpawning||bossActive)return;
    let r=Math.random(),t,rad,pts;
    if(r<0.45){t='meteor';rad=22;pts=10;}else if(r<0.8){t='satellite';rad=20;pts=15;}else{t='alien';rad=20;pts=25;}
    enemies.push({x:Math.random()*(W-50)+25,y:-50,radius:rad,type:t,speedY:getEnemySpeed(),wobbleAmp:Math.random()*1.5+0.5,wobbleSpeed:Math.random()*0.04+0.02,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.05,points:pts,isBoss:false,bossHP:0});
    enemiesSpawned++;
    if(enemiesSpawned>=enemiesInWave){waveSpawning=false;if(currentWave%bossEveryWaves===0)spawnBoss();}
  }
  function spawnBoss(){
    bossActive=true;
    bossObj={x:W/2,y:-80,radius:44,type:'boss',speedY:1.0,wobbleAmp:3,wobbleSpeed:0.03,rotation:0,rotSpeed:0.01,points:150,isBoss:true,bossHP:20+currentLevel*8,maxHP:20+currentLevel*8};
    enemies.push(bossObj);
  }
  function createExplosion(x,y,color,count=14){
    for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:0.7+Math.random()*0.7,color,size:2+Math.random()*5});
  }
  function killPlayer(){
    if(playerDead)return;initAudio();playerDead=true;gameActive=false;deathTimer=0;deathExplosionDone=false;sfxPlayerDeath();
    createExplosion(player.x,player.y,'#FFD700',25);createExplosion(player.x,player.y,'#FF4400',20);createExplosion(player.x,player.y,'#FFFFFF',10);
    updateFakeRating();
  }
  function checkCollisions(){
    if(!gameActive||playerDead)return;
    for(let i=bullets.length-1;i>=0;i--){let b=bullets[i];for(let j=enemies.length-1;j>=0;j--){let e=enemies[j],dx=b.x-e.x,dy=b.y-e.y;if(Math.sqrt(dx*dx+dy*dy)<e.radius+4){bullets.splice(i,1);if(e.isBoss){e.bossHP--;sfxBossHit();createExplosion(b.x,b.y,'#FFD700',5);if(e.bossHP<=0){sfxBossDeath();createExplosion(e.x,e.y,'#FF1744',20);createExplosion(e.x-20,e.y,'#FF9100',15);createExplosion(e.x+20,e.y,'#FFD600',15);enemies.splice(j,1);bossActive=false;bossObj=null;totalKills++;xtr+=50;updateHUD();triggerLevelComplete();}}else{sfxHit();createExplosion(e.x,e.y,'#FFD700',8);enemies.splice(j,1);totalKills++;if(Math.random()<0.3){xtr+=1;updateHUD();}}updateHUD();break;}}}
    if(!waveSpawning&&!bossActive&&enemies.length===0&&gameActive&&!playerDead&&!player.flyingAway){sfxWaveComplete();currentWave++;updateHUD();waveTransition=true;waveTransitionTimer=0;waveTransitionText=t('wavePhrases')[(currentWave-2)%10];startWave();updateFakeRating();}
    for(let i=enemies.length-1;i>=0;i--){let e=enemies[i],dx=player.x-e.x,dy=player.y-e.y;if(Math.sqrt(dx*dx+dy*dy)<e.radius+20){if(player.shield){player.shield=false;createExplosion(e.x,e.y,'#00FFFF',12);if(!e.isBoss)enemies.splice(i,1);continue;}if(playerLives>1){playerLives--;createExplosion(e.x,e.y,'#FF0000',10);if(!e.isBoss)enemies.splice(i,1);continue;}killPlayer();break;}}
  }
  function triggerLevelComplete(){gameActive=false;player.flyingAway=true;player.flyTimer=0;waveTransition=false;updateFakeRating();}
  function updateHUD(){starCounterSpan.textContent=xtr;waveCounterSpan.textContent=currentWave;killsCounterSpan.textContent=totalKills;if(menuXtrSpan)menuXtrSpan.textContent=xtr;}

  function update(){
    for(let i=particles.length-1;i>=0;i--){particles[i].x+=particles[i].vx;particles[i].y+=particles[i].vy;particles[i].life-=0.025;if(particles[i].life<=0)particles.splice(i,1);}
    if(gameState==='loading')return;
    if(gameState==='playing'){
      if(!playerDead&&!player.flyingAway){let dx=targetX-player.x;player.x+=dx*0.25;}
      if(player.flyingAway){player.y-=7;player.flyTimer++;if(player.y<-80){currentLevel++;currentWave=1;player.flyingAway=false;player.y=H-80;player.x=W/2;targetX=W/2;player.shield=false;player.doubleShot=false;playerLives=1;gameActive=true;bullets=[];enemies=[];startWave();updateHUD();}return;}
      if(playerDead){deathTimer++;if(deathTimer>90&&!deathExplosionDone){deathExplosionDone=true;finalStarsSpan.textContent=xtr;finalWaveSpan.textContent=currentWave;finalKillsSpan.textContent=totalKills;gameOverScreen.style.display='flex';hud.style.display='none';gameState='dead';}return;}
      if(waveSpawning&&!bossActive){spawnTimer--;if(spawnTimer<=0){spawnEnemy();spawnTimer=Math.max(8,30-currentLevel*2);}}
      for(let i=enemies.length-1;i>=0;i--){let e=enemies[i];e.y+=e.speedY;e.rotation+=e.rotSpeed;if(e.isBoss){e.x+=Math.sin(frameCount*e.wobbleSpeed)*e.wobbleAmp;if(e.y>100)e.y=100+Math.sin(frameCount*0.025)*30;}else{e.x+=Math.sin(frameCount*e.wobbleSpeed+i)*e.wobbleAmp;}if(e.y>H+60&&!e.isBoss)enemies.splice(i,1);}
      for(let i=bullets.length-1;i>=0;i--){bullets[i].y+=bullets[i].speed;if(bullets[i].y<-20)bullets.splice(i,1);}
      checkCollisions();
    }
    frameCount++;
  }

  function drawStars(){
    ctx.fillStyle='white';
    for(let i=0;i<60;i++){let sx=(i*19+frameCount*0.15)%W,sy=(i*13)%H;ctx.globalAlpha=0.4+Math.sin(i+frameCount*0.08)*0.3;ctx.beginPath();ctx.arc(sx,sy,0.8+(i%3)*0.4,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }
  function drawEnemy(e){
    ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rotation);
    let s=sprites[e.type];if(s&&s.complete){let sz=e.radius*2.2;ctx.drawImage(s,-sz/2,-sz/2,sz,sz);}
    ctx.restore();
    if(e.isBoss){ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle='#333';ctx.fillRect(-38,-e.radius-18,76,9);ctx.fillStyle='#00E676';ctx.fillRect(-38,-e.radius-18,76*(e.bossHP/e.maxHP),9);ctx.fillStyle='white';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.fillText(t('bossLabel')+e.bossHP+'/'+e.maxHP,0,-e.radius-26);ctx.restore();}
  }
  function draw(){
    ctx.clearRect(0,0,W,H);drawStars();if(gameState==='loading')return;
    enemies.forEach(e=>drawEnemy(e));
    bullets.forEach(b=>{let s=sprites.bullet;if(s&&s.complete)ctx.drawImage(s,b.x-b.width/2,b.y-b.height/2,b.width,b.height);else{ctx.fillStyle='#FFD700';ctx.shadowBlur=8;ctx.shadowColor='#FFA000';ctx.fillRect(b.x-2,b.y-7,4,14);}});
    if(!playerDead&&(!player.flyingAway||player.flyTimer<60)){
      ctx.save();ctx.translate(player.x,player.y);
      let glow=0.5+Math.sin(frameCount*0.5)*0.3;
      ctx.fillStyle=`rgba(0,191,255,${glow})`;ctx.shadowBlur=12;ctx.shadowColor='#00BFFF';
      ctx.beginPath();ctx.arc(0,player.height/2+2,6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(-9,player.height/2-2,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(9,player.height/2-2,4,0,Math.PI*2);ctx.fill();
      let s=sprites.player;if(s&&s.complete)ctx.drawImage(s,-player.width/2,-player.height/2,player.width,player.height);
      if(player.shield){ctx.strokeStyle='#00FFFF';ctx.lineWidth=3;ctx.shadowBlur=25;ctx.shadowColor='#00FFFF';ctx.beginPath();ctx.arc(0,0,player.width/2+6,0,Math.PI*2);ctx.stroke();}
      ctx.restore();
    }
    particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    if(gameState==='playing'&&playerLives>1&&!playerDead){ctx.fillStyle='white';ctx.font='bold 13px Arial';ctx.fillText('❤️ x'+playerLives,15,H-15);}
    if(waveTransition&&gameState==='playing'){waveTransitionTimer++;ctx.save();ctx.font='bold 28px Arial';ctx.textAlign='center';let alpha=Math.min(1,waveTransitionTimer/20)*(1-Math.max(0,(waveTransitionTimer-60)/30));ctx.globalAlpha=alpha;ctx.fillStyle='#FFD700';ctx.shadowBlur=20;ctx.shadowColor='#FFA000';ctx.fillText(waveTransitionText,W/2,H/2-30);ctx.font='18px Arial';ctx.fillText(t('waveLabel')+currentWave,W/2,H/2+15);ctx.restore();if(waveTransitionTimer>90)waveTransition=false;}
  }

  function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}

  function simulateLoading(){
    let progress=0;const bar=document.getElementById('loadingBar'),text=document.getElementById('loadingText'),steps=t('loadingText');let step=0;
    const interval=setInterval(()=>{progress+=Math.random()*20+8;if(progress>=100){progress=100;clearInterval(interval);text.textContent=steps[3];bar.style.width='100%';setTimeout(()=>{loadingScreen.style.display='none';menuScreen.style.display='flex';gameState='menu';applyTranslations();ratingValueSpan.textContent=fakeRating;},400);}else{bar.style.width=progress+'%';if(progress>(step+1)*25&&step<3){step++;text.textContent=steps[step];}}},200);
  }

  function startGame(){initAudio();gameState='playing';gameActive=true;playerDead=false;player.flyingAway=false;player.x=W/2;player.y=H-80;targetX=W/2;player.shield=false;player.doubleShot=false;playerLives=1;currentWave=1;currentLevel=1;totalKills=0;bullets=[];enemies=[];particles=[];waveTransition=false;menuScreen.style.display='none';gameOverScreen.style.display='none';shopScreen.style.display='none';hud.style.display='flex';updateHUD();startWave();ratingValueSpan.textContent=fakeRating;}
  function goToMenu(){gameState='menu';gameActive=false;playerDead=false;player.flyingAway=false;bullets=[];enemies=[];particles=[];gameOverScreen.style.display='none';shopScreen.style.display='none';hud.style.display='none';menuScreen.style.display='flex';updateHUD();applyTranslations();}

  document.getElementById('playBtn').addEventListener('click',startGame);
  document.getElementById('restartBtn').addEventListener('click',startGame);
  document.getElementById('toMenuBtn').addEventListener('click',goToMenu);
  document.getElementById('menuShopBtn').addEventListener('click',()=>{shopScreen.style.display='flex';gameState='shop';});
  document.getElementById('openShopBtn').addEventListener('click',()=>{shopScreen.style.display='flex';gameState='shop';});
  document.getElementById('closeShopBtn').addEventListener('click',()=>{shopScreen.style.display='none';gameState=gameOverScreen.style.display==='flex'?'dead':'playing';if(gameState==='playing')hud.style.display='flex';if(gameState==='menu')menuScreen.style.display='flex';});
  document.querySelectorAll('.lang-btn').forEach(btn=>{btn.addEventListener('click',()=>setLanguage(btn.dataset.lang));});
  document.getElementById('buyShieldBtn').addEventListener('click',()=>{if(xtr>=50){xtr-=50;player.shield=true;updateHUD();alert(t('alertShield'));}else alert(t('alertNoXTR'));});
  document.getElementById('buyDoubleShotBtn').addEventListener('click',()=>{if(xtr>=100){xtr-=100;player.doubleShot=true;updateHUD();alert(t('alertDouble'));}else alert(t('alertNoXTR'));});
  document.getElementById('buyExtraLifeBtn').addEventListener('click',()=>{if(xtr>=75){xtr-=75;playerLives++;updateHUD();alert(t('alertLife'));}else alert(t('alertNoXTR'));});
  document.getElementById('donateStarsBtn').addEventListener('click',()=>{if(window.Telegram&&Telegram.WebApp)Telegram.WebApp.showAlert(t('alertDonate'));else alert(t('alertDonate'));xtr+=500;updateHUD();});

  resizeCanvas();simulateLoading();gameLoop();
})();
</script>
</body>
