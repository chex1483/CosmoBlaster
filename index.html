<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action=manipulation">
  <title>✨ Cosmo Blaster XTR | Telegram Mini App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      touch-action: pan-x pan-y;
      user-select: none;
    }
    .game-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 100dvh;
      max-height: 750px;
      background: #050510;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.1);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 24px;
    }
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 24px;
      padding: 30px;
      color: white;
      text-align: center;
    }
    .loading-screen {
      background: #050510;
      z-index: 30;
    }
    .loading-bar-bg {
      width: 200px;
      height: 8px;
      background: #1a1a3e;
      border-radius: 10px;
      margin: 20px 0;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00BFFF, #FFD966);
      border-radius: 10px;
      transition: width 0.3s;
      width: 0%;
    }
    .loading-text {
      color: #aaa;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    .loading-spinner {
      font-size: 3rem;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .menu-screen {
      background: rgba(5, 5, 16, 0.95);
      backdrop-filter: blur(15px);
    }
    .menu-screen h1 {
      font-size: 2.5rem;
      background: linear-gradient(45deg, #FFD700, #FF6B6B, #4ECDC4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      font-weight: 900;
    }
    .menu-screen .subtitle {
      color: #aaa;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .menu-btn {
      background: linear-gradient(180deg, #FFD966 0%, #FF8C00 100%);
      border: none;
      color: #1a1a2e;
      font-weight: bold;
      padding: 15px 40px;
      border-radius: 40px;
      font-size: 1.3rem;
      margin: 8px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,140,0,0.5);
      transition: 0.2s;
      letter-spacing: 1px;
      pointer-events: auto;
      width: 200px;
    }
    .menu-btn.secondary {
      background: transparent;
      border: 2px solid #FFD966;
      color: #FFD966;
      box-shadow: none;
    }
    .menu-btn:active {
      transform: scale(0.94);
    }
    .game-over-screen {
      background: rgba(5, 0, 20, 0.9);
      backdrop-filter: blur(15px);
    }
    .game-over-screen h2 {
      font-size: 2.8rem;
      text-shadow: 0 0 30px #ff0000, 0 0 60px #ff4400;
      margin-bottom: 10px;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .shop-screen h2 {
      font-size: 2rem;
      color: #FFD966;
      margin-bottom: 25px;
    }
    .btn {
      background: linear-gradient(180deg, #FFD966 0%, #FFB800 100%);
      border: none;
      color: #1a1a2e;
      font-weight: bold;
      padding: 15px 35px;
      border-radius: 40px;
      font-size: 1.3rem;
      margin: 10px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,200,0,0.4);
      transition: 0.2s;
      pointer-events: auto;
    }
    .btn:active {
      transform: scale(0.94);
    }
    .shop-item {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 15px 25px;
      margin: 8px 0;
      width: 85%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .close-btn {
      background: transparent;
      color: white;
      border: 1px solid white;
      font-size: 1rem;
      padding: 10px 25px;
      border-radius: 30px;
      margin-top: 20px;
    }
    .hud {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    .hud-panel {
      background: rgba(5, 5, 20, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 25px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #FFD966;
      font-weight: bold;
      font-size: 0.95rem;
      border: 1px solid rgba(255,215,0,0.25);
    }
    .hud-panel.wave-hud {
      color: #00BFFF;
      border-color: rgba(0,191,255,0.25);
    }
    .shop-btn-hud {
      pointer-events: auto;
      background: rgba(255,42,117,0.9);
      border: none;
      color: white;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 25px;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(255,42,117,0.4);
      cursor: pointer;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .shop-btn-hud:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
<div class="game-container" id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- Загрузочный экран -->
  <div class="screen loading-screen" id="loadingScreen">
    <div class="loading-spinner">🚀</div>
    <h2 style="color:#FFD966;">COSMO BLASTER</h2>
    <div class="loading-bar-bg">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingText">Загрузка...</div>
  </div>

  <!-- Главное меню -->
  <div class="screen menu-screen" id="menuScreen" style="display:none;">
    <h1>COSMO BLASTER</h1>
    <p class="subtitle">Аркадный экшен в космосе</p>
    <button class="menu-btn" id="playBtn">🎮 ИГРАТЬ</button>
    <button class="menu-btn secondary" id="menuShopBtn">🛍️ МАГАЗИН</button>
    <p style="margin-top:20px; color:#666; font-size:0.8rem;">💰 Баланс: <span id="menuXtr">0</span> XTR</p>
  </div>

  <!-- HUD (во время игры) -->
  <div class="hud" id="hud" style="display:none;">
    <div style="display:flex; gap:8px;">
      <div class="hud-panel">⭐ <span id="starCounter">0</span></div>
      <div class="hud-panel wave-hud">🌊 <span id="waveCounter">1</span></div>
    </div>
    <button class="shop-btn-hud" id="openShopBtn">🛍️ XTR</button>
  </div>

  <!-- Экран Game Over -->
  <div class="screen game-over-screen" id="gameOverScreen" style="display:none;">
    <h2>💥 ВЗРЫВ!</h2>
    <p style="font-size:1.2rem; margin:8px 0;">Волна: <span id="finalWave">1</span></p>
    <p style="font-size:1rem; color:#FFD966;">XTR: <span id="finalStars">0</span> ⭐</p>
    <button class="btn" id="restartBtn">🚀 ИГРАТЬ СНОВА</button>
    <button class="btn" style="background:transparent; border:1px solid white; color:white;" id="toMenuBtn">🏠 В МЕНЮ</button>
  </div>

  <!-- Магазин -->
  <div class="screen shop-screen" id="shopScreen" style="display:none;">
    <h2>✨ МАГАЗИН XTR ✨</h2>
    <div class="shop-item">
      <span>🛡️ Щит (1 игра)</span>
      <button class="btn" style="padding:8px 18px; font-size:0.9rem;" id="buyShieldBtn">50 XTR</button>
    </div>
    <div class="shop-item">
      <span>⚡ Двойной выстрел</span>
      <button class="btn" style="padding:8px 18px; font-size:0.9rem;" id="buyDoubleShotBtn">100 XTR</button>
    </div>
    <div class="shop-item">
      <span>❤️ Доп. жизнь</span>
      <button class="btn" style="padding:8px 18px; font-size:0.9rem;" id="buyExtraLifeBtn">75 XTR</button>
    </div>
    <div class="shop-item">
      <span>💎 500 XTR</span>
      <button class="btn" style="padding:8px 18px; font-size:0.9rem; background:#FF2A75; color:white;" id="donateStarsBtn">💳 Купить</button>
    </div>
    <button class="close-btn" id="closeShopBtn">✕ Закрыть</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Экраны
  const loadingScreen = document.getElementById('loadingScreen');
  const menuScreen = document.getElementById('menuScreen');
  const hud = document.getElementById('hud');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const shopScreen = document.getElementById('shopScreen');

  // HUD
  const starCounterSpan = document.getElementById('starCounter');
  const waveCounterSpan = document.getElementById('waveCounter');
  const finalStarsSpan = document.getElementById('finalStars');
  const finalWaveSpan = document.getElementById('finalWave');
  const menuXtrSpan = document.getElementById('menuXtr');

  let W, H;

  // Состояние
  let gameState = 'loading'; // loading | menu | playing | dead | shop
  let gameActive = false;
  let playerDead = false;
  let deathTimer = 0;
  let deathExplosionDone = false;
  let xtr = 200;
  let currentWave = 1;
  let currentLevel = 1;
  let enemiesInWave = 0;
  let enemiesSpawned = 0;
  let waveSpawning = true;
  let bossActive = false;
  let bossObj = null;
  let playerLives = 1;
  let waveTransition = false;
  let waveTransitionTimer = 0;
  let waveTransitionText = '';

  let player = {
    x: 200, y: 550, width: 40, height: 44,
    shield: false, doubleShot: false,
    flyingAway: false, flyTimer: 0
  };

  let bullets = [];
  let enemies = [];
  let particles = [];
  let spawnTimer = 0;
  let frameCount = 0;
  let targetX = 200;

  const enemiesPerWaveBase = 10;
  const bossEveryWaves = 10;
  const wavePhrases = [
    "ОТЛИЧНЫЙ ВЫСТРЕЛ! 🎯", "ПРОФЕССИОНАЛ! 👑", "БОГОПОДОБНО! ⚡",
    "ВПЕЧАТЛЯЕТ! 🌟", "РАЗРУШИТЕЛЬНО! 💥", "НЕОСТАНОВИМ! 🔥",
    "ЛЕГЕНДАРНО! 🏆", "УБИЙСТВЕННО! 💀", "БЕЗУПРЕЧНО! ✨", "КОСМИЧЕСКАЯ МОЩЬ! 🌌"
  ];

  function resizeCanvas() {
    const container = document.getElementById('gameContainer');
    const rect = container.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = W;
    canvas.height = H;
    player.y = H - 80;
    targetX = W / 2;
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Управление
  function handleMove(e) {
    e.preventDefault();
    if (gameState !== 'playing' || !gameActive || playerDead || player.flyingAway) return;
    const rect = canvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    targetX = (clientX - rect.left) * (W / rect.width);
    targetX = Math.min(Math.max(targetX, 20), W - 20);
  }

  canvas.addEventListener('mousemove', handleMove);
  canvas.addEventListener('touchmove', handleMove, { passive: false });
  canvas.addEventListener('touchstart', handleMove, { passive: false });

  function shootBullet() {
    if (gameState !== 'playing' || !gameActive || playerDead || player.flyingAway) return;
    bullets.push({ x: player.x - 3, y: player.y - 22, width: 5, height: 16, speed: -10 });
    if (player.doubleShot) {
      bullets.push({ x: player.x + 12, y: player.y - 14, width: 5, height: 16, speed: -10 });
      bullets.push({ x: player.x - 18, y: player.y - 14, width: 5, height: 16, speed: -10 });
    }
  }

  setInterval(() => { if (gameState === 'playing') shootBullet(); }, 250);

  function startWave() {
    waveSpawning = true;
    enemiesSpawned = 0;
    enemiesInWave = enemiesPerWaveBase + (currentWave - 1) * 3;
    bossActive = false;
    bossObj = null;
    spawnTimer = 15;
    updateHUD();
  }

  function spawnEnemy() {
    if (!waveSpawning || bossActive) return;
    let typeRand = Math.random();
    let enemyType, color, radius, points, emoji;
    if (typeRand < 0.45) {
      enemyType = 'meteor'; color = '#E67E22'; radius = 15; points = 10; emoji = '🪨';
    } else if (typeRand < 0.8) {
      enemyType = 'satellite'; color = '#3498DB'; radius = 13; points = 15; emoji = '🛰️';
    } else {
      enemyType = 'alien'; color = '#2ECC71'; radius = 14; points = 25; emoji = '👾';
    }
    enemies.push({
      x: Math.random() * (W - 50) + 25, y: -40, radius: radius,
      type: enemyType, color: color, emoji: emoji,
      speedY: 2.2 + Math.random() * 2.8 + currentLevel * 0.3,
      wobbleAmp: Math.random() * 1.5 + 0.5,
      wobbleSpeed: Math.random() * 0.04 + 0.02,
      points: points, isBoss: false, bossHP: 0
    });
    enemiesSpawned++;
    if (enemiesSpawned >= enemiesInWave) {
      waveSpawning = false;
      if (currentWave % bossEveryWaves === 0) spawnBoss();
    }
  }

  function spawnBoss() {
    bossActive = true;
    bossObj = {
      x: W / 2, y: -70, radius: 42, type: 'boss', color: '#E74C3C', emoji: '👹',
      speedY: 1.0, wobbleAmp: 3, wobbleSpeed: 0.03, points: 150,
      isBoss: true, bossHP: 20 + currentLevel * 8, maxHP: 20 + currentLevel * 8
    };
    enemies.push(bossObj);
  }

  function createExplosion(x, y, color, count = 14) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        life: 0.7 + Math.random() * 0.7,
        color, size: 2 + Math.random() * 5
      });
    }
  }

  function killPlayer() {
    if (playerDead) return;
    playerDead = true;
    gameActive = false;
    deathTimer = 0;
    deathExplosionDone = false;
    createExplosion(player.x, player.y, '#FFD700', 25);
    createExplosion(player.x, player.y, '#FF4400', 20);
    createExplosion(player.x, player.y, '#FFFFFF', 10);
  }

  function checkCollisions() {
    if (!gameActive || playerDead) return;

    // Пули × враги
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dx = b.x - e.x, dy = b.y - e.y;
        if (Math.sqrt(dx*dx + dy*dy) < e.radius + 6) {
          bullets.splice(i, 1);
          if (e.isBoss) {
            e.bossHP--;
            createExplosion(b.x, b.y, '#FFD700', 5);
            if (e.bossHP <= 0) {
              createExplosion(e.x, e.y, '#FF1744', 20);
              createExplosion(e.x-20, e.y, '#FF9100', 15);
              createExplosion(e.x+20, e.y, '#FFD600', 15);
              enemies.splice(j, 1);
              bossActive = false; bossObj = null;
              xtr += 50;
              updateHUD();
              triggerLevelComplete();
            }
          } else {
            createExplosion(e.x, e.y, e.color, 8);
            enemies.splice(j, 1);
            if (Math.random() < 0.3) { xtr += 1; updateHUD(); }
          }
          break;
        }
      }
    }

    // Проверка завершения волны
    if (!waveSpawning && !bossActive && enemies.length === 0 && gameActive && !playerDead && !player.flyingAway) {
      currentWave++;
      updateHUD();
      waveTransition = true;
      waveTransitionTimer = 0;
      waveTransitionText = wavePhrases[(currentWave - 2) % wavePhrases.length];
      startWave();
    }

    // Игрок × враги
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const dx = player.x - e.x, dy = player.y - e.y;
      if (Math.sqrt(dx*dx + dy*dy) < e.radius + 18) {
        if (player.shield) {
          player.shield = false;
          createExplosion(e.x, e.y, '#00FFFF', 12);
          if (!e.isBoss) enemies.splice(i, 1);
          continue;
        }
        if (playerLives > 1) {
          playerLives--;
          createExplosion(e.x, e.y, '#FF0000', 10);
          if (!e.isBoss) enemies.splice(i, 1);
          continue;
        }
        killPlayer();
        break;
      }
    }
  }

  function triggerLevelComplete() {
    gameActive = false;
    player.flyingAway = true;
    player.flyTimer = 0;
    waveTransition = false;
  }

  function updateHUD() {
    starCounterSpan.textContent = xtr;
    waveCounterSpan.textContent = currentWave;
    menuXtrSpan.textContent = xtr;
  }

  function update() {
    // Частицы обновляются всегда
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].x += particles[i].vx;
      particles[i].y += particles[i].vy;
      particles[i].life -= 0.025;
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    if (gameState === 'loading') return;

    if (gameState === 'playing') {
      // Движение игрока
      if (!playerDead && !player.flyingAway) {
        const dx = targetX - player.x;
        player.x += dx * 0.25;
      }

      // Улёт после босса
      if (player.flyingAway) {
        player.y -= 7;
        player.flyTimer++;
        if (player.y < -80) {
          currentLevel++;
          currentWave = 1;
          player.flyingAway = false;
          player.y = H - 80;
          player.x = W / 2;
          targetX = W / 2;
          player.shield = false;
          player.doubleShot = false;
          playerLives = 1;
          gameActive = true;
          bullets = [];
          enemies = [];
          startWave();
          updateHUD();
        }
        return;
      }

      // Смерть
      if (playerDead) {
        deathTimer++;
        if (deathTimer > 90 && !deathExplosionDone) {
          deathExplosionDone = true;
          finalStarsSpan.textContent = xtr;
          finalWaveSpan.textContent = currentWave;
          gameOverScreen.style.display = 'flex';
          hud.style.display = 'none';
          gameState = 'dead';
        }
        return;
      }

      // Спавн врагов
      if (waveSpawning && !bossActive) {
        spawnTimer--;
        if (spawnTimer <= 0) {
          spawnEnemy();
          spawnTimer = Math.max(8, 28 - currentLevel * 2);
        }
      }

      // Движение врагов
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speedY;
        if (e.isBoss) {
          e.x += Math.sin(frameCount * e.wobbleSpeed) * e.wobbleAmp;
          if (e.y > 100) e.y = 100 + Math.sin(frameCount * 0.025) * 30;
        } else {
          e.x += Math.sin(frameCount * e.wobbleSpeed + i) * e.wobbleAmp;
        }
        if (e.y > H + 60 && !e.isBoss) enemies.splice(i, 1);
      }

      // Пули
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y += bullets[i].speed;
        if (bullets[i].y < -20) bullets.splice(i, 1);
      }

      checkCollisions();
    }
    frameCount++;
  }

  function drawStars() {
    ctx.fillStyle = 'white';
    for (let i = 0; i < 60; i++) {
      let sx = (i * 19 + frameCount * 0.15) % W;
      let sy = (i * 13) % H;
      ctx.globalAlpha = 0.4 + Math.sin(i + frameCount * 0.08) * 0.3;
      ctx.beginPath();
      ctx.arc(sx, sy, 0.8 + (i % 3) * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.shadowBlur = e.isBoss ? 30 : 12;
    ctx.shadowColor = e.color;
    ctx.font = `${e.radius * 1.6}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.emoji, 0, 0);

    if (e.isBoss) {
            // HP bar
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#333';
      ctx.fillRect(-35, -e.radius - 20, 70, 8);
      ctx.fillStyle = '#00E676';
      ctx.fillRect(-35, -e.radius - 20, 70 * (e.bossHP / e.maxHP), 8);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 8px Arial';
      ctx.fillText(`👹 ${e.bossHP}/${e.maxHP}`, 0, -e.radius - 28);
    }
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawStars();

    if (gameState === 'loading') return;

    // Враги
    enemies.forEach(e => drawEnemy(e));

    // Пули
    ctx.fillStyle = '#FFD700';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#FFA000';
    bullets.forEach(b => {
      ctx.fillRect(b.x - 2, b.y - 7, 4, 14);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(b.x - 1, b.y - 5, 2, 8);
      ctx.fillStyle = '#FFD700';
    });

    // Игрок
    if (!playerDead && (!player.flyingAway || player.flyTimer < 60)) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#00BFFF';
      ctx.font = '38px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✈️', 0, 0);
      if (player.shield) {
        ctx.strokeStyle = '#00FFFF';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#00FFFF';
        ctx.beginPath();
        ctx.arc(0, 0, 28, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Частицы
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 6;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Жизни
    if (gameState === 'playing' && playerLives > 1 && !playerDead) {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 13px Arial';
      ctx.fillText('❤️ x' + playerLives, 15, H - 15);
    }

    // Переход волны
    if (waveTransition && gameState === 'playing') {
      waveTransitionTimer++;
      ctx.save();
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center';
      const alpha = Math.min(1, waveTransitionTimer / 20) * (1 - Math.max(0, (waveTransitionTimer - 60) / 30));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#FFD700';
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#FFA000';
      ctx.fillText(waveTransitionText, W/2, H/2 - 30);
      ctx.font = '18px Arial';
      ctx.fillText('ВОЛНА ' + currentWave, W/2, H/2 + 15);
      ctx.restore();
      if (waveTransitionTimer > 90) waveTransition = false;
    }
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Загрузка
  function simulateLoading() {
    let progress = 0;
    const bar = document.getElementById('loadingBar');
    const text = document.getElementById('loadingText');
    const steps = ['Загрузка графики...', 'Настройка физики...', 'Подключение XTR...', 'Готово!'];
    let step = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 25 + 10;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        text.textContent = 'Готово!';
        bar.style.width = '100%';
        setTimeout(() => {
          loadingScreen.style.display = 'none';
          menuScreen.style.display = 'flex';
          gameState = 'menu';
          updateHUD();
        }, 400);
      } else {
        bar.style.width = progress + '%';
        if (progress > (step + 1) * 25 && step < 3) {
          step++;
          text.textContent = steps[step];
        }
      }
    }, 200);
  }

  function startGame() {
    gameState = 'playing';
    gameActive = true;
    playerDead = false;
    player.flyingAway = false;
    player.x = W / 2;
    player.y = H - 80;
    targetX = W / 2;
    player.shield = false;
    player.doubleShot = false;
    playerLives = 1;
    currentWave = 1;
    currentLevel = 1;
    bullets = [];
    enemies = [];
    particles = [];
    waveTransition = false;
    menuScreen.style.display = 'none';
    gameOverScreen.style.display = 'none';
    shopScreen.style.display = 'none';
    hud.style.display = 'flex';
    updateHUD();
    startWave();
  }

  function goToMenu() {
    gameState = 'menu';
    gameActive = false;
    playerDead = false;
    player.flyingAway = false;
    bullets = [];
    enemies = [];
    particles = [];
    gameOverScreen.style.display = 'none';
    shopScreen.style.display = 'none';
    hud.style.display = 'none';
    menuScreen.style.display = 'flex';
    updateHUD();
  }

  // Кнопки
  document.getElementById('playBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('toMenuBtn').addEventListener('click', goToMenu);
  document.getElementById('menuShopBtn').addEventListener('click', () => {
    shopScreen.style.display = 'flex';
    gameState = 'shop';
  });
  document.getElementById('openShopBtn').addEventListener('click', () => {
    shopScreen.style.display = 'flex';
    gameState = 'shop';
  });
  document.getElementById('closeShopBtn').addEventListener('click', () => {
    shopScreen.style.display = 'none';
    gameState = gameOverScreen.style.display === 'flex' ? 'dead' : 'playing';
    if (gameState === 'playing') hud.style.display = 'flex';
    if (gameState === 'menu') menuScreen.style.display = 'flex';
  });

  document.getElementById('buyShieldBtn').addEventListener('click', () => {
    if (xtr >= 50) { xtr -= 50; player.shield = true; updateHUD(); alert('🛡️ Щит куплен!'); }
    else alert('Недостаточно XTR!');
  });
  document.getElementById('buyDoubleShotBtn').addEventListener('click', () => {
    if (xtr >= 100) { xtr -= 100; player.doubleShot = true; updateHUD(); alert('⚡ Двойной выстрел!'); }
    else alert('Недостаточно XTR!');
  });
  document.getElementById('buyExtraLifeBtn').addEventListener('click', () => {
    if (xtr >= 75) { xtr -= 75; playerLives++; updateHUD(); alert('❤️ +1 жизнь!'); }
    else alert('Недостаточно XTR!');
  });
  document.getElementById('donateStarsBtn').addEventListener('click', () => {
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.showAlert('💎 Платёж XTR...');
    } else {
      alert('💎 Донат 500 XTR (демо)');
    }
    xtr += 500; updateHUD();
  });

  // Старт
  resizeCanvas();
  simulateLoading();
  gameLoop();
})();
</script>
